name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  export-web:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6

    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          TEMPLATES_HOME="$HOME/.local/share/godot/export_templates/4.6.stable"
          mkdir -p "$TEMPLATES_HOME"
          if [ -d "/root/.local/share/godot/export_templates/4.6.stable" ]; then
            cp -r /root/.local/share/godot/export_templates/4.6.stable/* "$TEMPLATES_HOME/" || true
          fi
          if [ -d "/root/.local/share/godot/templates" ]; then
            cp /root/.local/share/godot/templates/* "$TEMPLATES_HOME/" || true
          fi
          echo "HOME=$HOME"
          echo "Templates dir contents:"
          ls -la "$TEMPLATES_HOME/"

      - name: Import project
        run: godot --headless --import 2>&1 || true
        timeout-minutes: 3

      - name: Export to Web
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: export-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
